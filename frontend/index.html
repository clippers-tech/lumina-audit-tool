<!-- Perplexity Computer Attribution — SEO Meta Tags -->
<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Clippers — LinkedIn Audit Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="24" height="24" rx="4" stroke="currentColor" stroke-width="2" fill="none" style="color: var(--color-primary);"/>
        <path d="M8 20V8h3v9h5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary);"/>
      </svg>
      <span class="logo">LUMINA</span>
      <span class="header-subtitle">LinkedIn Audit Tool</span>
    </div>
  </header>

  <!-- Input bar -->
  <div class="input-bar">
    <input
      class="input"
      type="url"
      id="url-input"
      placeholder="Paste a LinkedIn profile URL — e.g., https://www.linkedin.com/in/someone"
      autocomplete="off"
      spellcheck="false"
    >
    <button class="btn btn-primary" id="analyze-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      Analyze
    </button>
  </div>

  <!-- Error message area -->
  <div id="input-error" class="input-error" style="display: none;" role="alert"></div>

  <!-- In Progress section -->
  <section class="section" id="progress-section" style="display: none;">
    <h2 class="section-title">In Progress</h2>
    <div id="progress-jobs"></div>
  </section>

  <!-- Completed section -->
  <section class="section" id="completed-section" style="display: none;">
    <h2 class="section-title">Completed</h2>
    <div id="completed-jobs"></div>
  </section>

  <!-- Failed section -->
  <section class="section" id="failed-section" style="display: none;">
    <h2 class="section-title">Failed</h2>
    <div id="failed-jobs"></div>
  </section>

  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin: 0 auto var(--space-4); color: var(--color-text-faint);">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <p>Paste a LinkedIn profile URL above to run an audit</p>
    <p style="font-size: var(--text-xs); color: var(--color-text-faint); margin-top: var(--space-2);">
      The tool will analyse the prospect's personal brand, company presence, and content strategy
    </p>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </footer>

</div>

<!-- API Configuration -->
<script>
  window.LUMINA_API_URL = "https://lumina-audit-api.onrender.com";
</script>
<script src="app.js"></script>
</body>
</html>
