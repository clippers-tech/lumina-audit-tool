<body>
  <a href="#main-content" class="skip-nav">Skip to main content</a>

  <div class="app">

    <!-- ===== HEADER ===== -->
    <header class="site-header">
      <a href="/" class="logo-link" aria-label="Lumina Clippers home">
        <img src="logo.jpg" alt="Lumina Clippers" class="logo-img">
        <span class="logo-name">LUMINA CLIPPERS</span>
      </a>
    </header>

    <!-- ===== MAIN ===== -->
    <main id="main-content">
      <h1 class="page-title">Get Your <span class="accent">Free</span> Clipping Audit</h1>
      <p class="subheadline">
        FREE GROWTH AUDIT WITHIN 5 MINS - Analyse your competition + others.
      </p>

      <form id="audit-form" novalidate>

        <!-- REQUIRED section -->
        <div class="form-section">
          <div class="section-label">Required</div>

          <div class="field">
            <label for="full_name">Full Name</label>
            <input
              type="text"
              id="full_name"
              name="full_name"
              placeholder="Jane Smith"
              autocomplete="name"
              required
            >
          </div>

          <div class="field">
            <label for="email">Work Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="jane@company.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="field">
            <label for="company_name">Company Name</label>
            <input
              type="text"
              id="company_name"
              name="company_name"
              placeholder="Acme Inc."
              autocomplete="organization"
              required
            >
          </div>

          <div class="field">
            <label for="industry">Industry</label>
            <div class="select-wrapper">
              <select id="industry" name="industry" required>
                <option value="">Select your industry</option>
                <option value="SaaS">SaaS</option>
                <option value="E-commerce">E-commerce</option>
                <option value="Creator / Personal Brand">Creator / Personal Brand</option>
                <option value="Agency">Agency</option>
                <option value="Fintech">Fintech</option>
                <option value="Health & Wellness">Health &amp; Wellness</option>
                <option value="Real Estate">Real Estate</option>
                <option value="Crypto / Web3">Crypto / Web3</option>
                <option value="Media / Entertainment">Media / Entertainment</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
        </div>

        <!-- YOUR PROFILES section -->
        <div class="form-section">
          <div class="section-label">
            Your Profiles
            <span class="hint">(at least one required)</span>
          </div>

          <div class="field">
            <label for="linkedin_url">
              LinkedIn URL
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="url"
              id="linkedin_url"
              name="linkedin_url"
              placeholder="https://www.linkedin.com/in/yourname"
              autocomplete="url"
            >
          </div>

          <div class="field">
            <label for="twitter_url">
              Twitter / X URL
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="url"
              id="twitter_url"
              name="twitter_url"
              placeholder="https://x.com/yourhandle"
              autocomplete="url"
            >
          </div>

          <div class="field">
            <label for="tiktok_url">
              TikTok URL
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="url"
              id="tiktok_url"
              name="tiktok_url"
              placeholder="https://www.tiktok.com/@yourhandle"
              autocomplete="url"
            >
          </div>

          <div class="field">
            <label for="youtube_url">
              YouTube URL
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="url"
              id="youtube_url"
              name="youtube_url"
              placeholder="https://www.youtube.com/@yourchannel"
              autocomplete="url"
            >
          </div>

          <div class="field">
            <label for="instagram_url">
              Instagram URL
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="url"
              id="instagram_url"
              name="instagram_url"
              placeholder="https://www.instagram.com/yourhandle"
              autocomplete="url"
            >
          </div>
        </div>

        <!-- YOUR BUSINESS section -->
        <div class="form-section">
          <div class="section-label">Your Business</div>

          <div class="field">
            <label for="own_revenue">
              Estimated revenue last year
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="text"
              id="own_revenue"
              name="own_revenue"
              placeholder="e.g. $500,000"
            >
          </div>

          <div class="field">
            <label for="competitor_name">
              Biggest competitor's website
              <span class="optional-badge">optional</span>
            </label>
            <input
              type="url"
              id="competitor_name"
              name="competitor_name"
              placeholder="e.g. https://nike.com"
            >
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submit-btn" aria-label="Submit audit request">
          <!-- Magnifying glass icon -->
          <svg class="btn-icon" viewBox="0 0 18 18" fill="none"
               xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
            <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="2"/>
            <path d="M11.5 11.5L16 16" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round"/>
          </svg>
          <span class="btn-text">Get My Free Audit</span>
        </button>

        <!-- Trust signals -->
        <div class="trust-signals" aria-label="Trust indicators">
          <span class="trust-item">
            <span class="trust-check" aria-hidden="true">✓</span>
            Free forever
          </span>
          <span class="trust-item">
            <span class="trust-check" aria-hidden="true">✓</span>
            No credit card
          </span>
          <span class="trust-item">
            <span class="trust-check" aria-hidden="true">✓</span>
            Delivered in 5 minutes
          </span>
        </div>

      </form>

      <!-- Error message -->
      <div id="form-error" class="error-msg" role="alert" aria-live="assertive"></div>

    </main>
