services:
  - type: web
    name: lumina-audit-tool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: REPLY_TO_EMAIL
        sync: false
      - key: INTERNAL_NOTIFY_EMAIL
        sync: false
      - key: CALENDLY_URL
        sync: false
